<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitAI Adobe API</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
        margin: 0;
        padding: 40px 20px;
        background: #0b1020;
        color: #e8ecff;
      }
      .card {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px;
        border: 1px solid rgba(232,236,255,0.12);
        border-radius: 16px;
        background: rgba(255,255,255,0.04);
      }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { margin: 8px 0; line-height: 1.5; color: rgba(232,236,255,0.85); }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
      button, a.btn {
        appearance: none;
        border: 1px solid rgba(232,236,255,0.18);
        background: rgba(255,255,255,0.06);
        color: #e8ecff;
        border-radius: 12px;
        padding: 10px 14px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      button:hover, a.btn:hover { background: rgba(255,255,255,0.10); }
      pre {
        margin-top: 14px;
        padding: 14px;
        border-radius: 12px;
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(232,236,255,0.12);
        overflow: auto;
      }
      .muted { color: rgba(232,236,255,0.7); font-size: 13px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>FitAI Adobe API</h1>
      <p>If you can see this page, the deployment is up. Use <code>/health</code> to confirm the serverless function is working.</p>

      <div class="row">
        <a class="btn" href="/health">Open /health</a>
        <button id="ping">Ping /health</button>
      </div>

      <pre id="out" aria-live="polite">Click “Ping /health”…</pre>
      <div class="muted">Expected: JSON with <code>{"ok":true,...}</code></div>
    </div>

    <script>
      const out = document.getElementById("out");
      document.getElementById("ping").addEventListener("click", async () => {
        out.textContent = "Loading...";
        try {
          const res = await fetch("/health", { method: "GET" });
          const text = await res.text();
          out.textContent = `${res.status} ${res.statusText}\n\n${text}`;
        } catch (e) {
          out.textContent = `Failed to fetch /health\n\n${e && e.message ? e.message : String(e)}`;
        }
      });
    </script>
  </body>
</html>
